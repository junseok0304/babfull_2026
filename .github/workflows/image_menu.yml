name: image Menu

on:
    workflow_dispatch:

jobs:
    send-weekly-menu:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run weekly menu bot
              env:
                  BABFULL_MENU_URL: ${{ secrets.BABFULL_MENU_URL }}
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
              run: python sikdan_image.py